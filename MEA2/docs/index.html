<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Dashboard | TravelEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="Images/logo.jpg" alt="TravelEase Logo" class="logo-img">
            <span class="logo-text">TravelEase</span>
        </div>
        <div>
            <span id="userNameDisplay" style="margin-right: 1.5rem; font-weight: 500;">Hello, Traveler</span>
            <a href="SignIn.html" class="auth-footer" style="margin-top: 0; color: var(--error-color)"
                id="logoutBtn">Logout</a>
        </div>
    </header>

    <main style="display: block;">
        <section class="landing-hero">
            <h1>Welcome to Your Next Adventure</h1>
            <p class="subtitle">Discover curated experiences and destinations around the globe.</p>
        </section>

        <section class="gallery">
            <div class="gallery-item">
                <img src="Images/samplpic1.jpg" alt="Tropical Paradise" class="gallery-img">
                <div class="gallery-content">
                    <h3 class="gallery-title">Tropical Getaway</h3>
                    <p class="subtitle" style="text-align: left; margin-bottom: 0;">Explore the crystal clear waters of
                        the Maldives.</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="Images/samplepic2.jpg" alt="Historic City" class="gallery-img">
                <div class="gallery-content">
                    <h3 class="gallery-title">European Charm</h3>
                    <p class="subtitle" style="text-align: left; margin-bottom: 0;">Walking tours through the heart of
                        Florence, Italy.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
