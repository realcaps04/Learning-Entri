<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TravelEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="Images/logo.jpg" alt="TravelEase Logo" class="logo-img">
            <span class="logo-text">TravelEase</span>
        </div>
    </header>

    <main>
        <section class="auth-container">
            <h1>Create Account</h1>
            <p class="subtitle">Join our community of travelers</p>

            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                    <div class="error-message" id="fullNameError"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="10-digit number" required>
                    <div class="error-message" id="phoneError"></div>
                </div>

                <div class="form-group">
                    <label for="location">Location / City</label>
                    <input type="text" id="location" placeholder="New York" required>
                    <div class="error-message" id="locationError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters (letters & numbers)" required>
                    <button type="button" class="password-toggle" data-for="password">Show</button>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                    <button type="button" class="password-toggle" data-for="confirmPassword">Show</button>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="btn" id="signupBtn">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="SignIn.html">Sign In</a>
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
