<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beautiful weather app with real-time weather data from OpenWeatherMap API">
    <meta name="keywords" content="weather, weather app, forecast, temperature, climate">
    <meta name="author" content="100 Days Coding Challenge">
    <title>Weather Checker - Real-Time Weather Data</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
</head>

<body>
    <!-- Animated Background Particles -->
    <div class="background-particles"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Weather Card -->
        <div class="weather-card">
            <!-- Header -->
            <header class="header">
                <h1 class="app-title">🌤️ Weather Checker</h1>
                <p class="app-subtitle">Get real-time weather updates for any city</p>
            </header>

            <!-- Search Section -->
            <section class="search-section">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input" placeholder="Enter city name..."
                        aria-label="City name search" autocomplete="off">
                    <button id="searchBtn" class="search-btn" aria-label="Search weather">
                        Search
                    </button>
                </div>
            </section>

            <!-- Loading State -->
            <div id="loadingState" class="loading">
                <div class="loading-spinner"></div>
                <p class="loading-text">Fetching weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message">
                <div class="error-icon">⚠️</div>
                <p class="error-text">An error occurred</p>
            </div>

            <!-- Weather Display -->
            <section id="weatherDisplay" class="weather-display">
                <!-- Location Info -->
                <div class="location-info">
                    <h2 id="locationName" class="location-name">
                        <span class="location-icon">📍</span> Loading...
                    </h2>
                    <p id="currentDate" class="current-date">Loading...</p>
                </div>

                <!-- Main Weather Info -->
                <div class="main-weather">
                    <div class="weather-icon-container">
                        <img id="weatherIcon" class="weather-icon" src="" alt="Weather icon">
                    </div>
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="weather-description" id="weatherDescription">Loading...</div>
                    <div class="feels-like" id="feelsLike">Feels like --°C</div>
                </div>

                <!-- Weather Details Grid -->
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-icon">💧</span>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-icon">💨</span>
                        <div class="detail-label">Wind Speed</div>
                        <div class="detail-value" id="windSpeed">-- m/s</div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-icon">🌡️</span>
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value" id="pressure">-- hPa</div>
                    </div>

                    <div class="detail-item">
                        <span class="detail-icon">👁️</span>
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value" id="visibility">-- km</div>
                    </div>
                </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
                <p class="footer-text">
                    Powered by <a href="https://openweathermap.org/" target="_blank" rel="noopener noreferrer"
                        class="footer-link">OpenWeatherMap</a>
                </p>
            </footer>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>

</html>
