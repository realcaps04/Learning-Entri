<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TravelEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="Images/logo.jpg" alt="TravelEase Logo" class="logo-img">
            <span class="logo-text">TravelEase</span>
        </div>
    </header>

    <main>
        <section class="auth-container">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your travel dashboard</p>

            <form id="signinForm" novalidate>
                <div class="form-group">
                    <label for="signinEmail">Email Address</label>
                    <input type="email" id="signinEmail" placeholder="john@example.com" required>
                    <div class="error-message" id="signinEmailError"></div>
                </div>

                <div class="form-group">
                    <label for="signinPassword">Password</label>
                    <input type="password" id="signinPassword" placeholder="••••••••" required>
                    <div class="error-message" id="signinPasswordError"></div>
                </div>

                <div class="error-message" id="authError" style="text-align: center; margin-bottom: 1rem;"></div>

                <button type="submit" class="btn" id="signinBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="SignUp.html">Sign Up</a>
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
